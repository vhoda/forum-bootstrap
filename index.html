<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formulario</title>

    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css?family=Prompt:200,300,400,500" rel="stylesheet">
    <!-- Optional theme -->
    <link rel="stylesheet" href="estilos.css">
  </head>
  <body>
    <section class="form-container">
      <div class="container-fluid">
        <form class="form-signup" id="dataSheet">
          <h2 id="form-signup-heading">
            Formulario
          </h2>
          <div class="number-container input-box">
            <label for="number">Rut</label>
            <input type="text" id="number" class="form-control"
            placeholder="Ingrese su Rut" required>
          </div>
          <div class="name-container input-box">
            <label for="name">Nombre</label>
            <input type="text" id="name" class="form-control"
            placeholder="Ingrese su nombre" required>
          </div>
          <div class="lastname-container input-box">
            <label for="lastname">Apellidos</label>
            <input type="text" id="lastname" class="form-control"
            placeholder="Ingrese su Apellido Paterno" required>
          </div>
          <div class="lastname-container input-box">
            <label for="lastname"class="sr-only">Apellido</label>
            <input type="text" id="lastname" class="form-control"
            placeholder="Ingrese su Apellido Materno" required>
          </div>
          <div class="form-group">
            <label class="control-label" for="date">Fecha de nacimiento</label>
            <input class="form-control" id="date" name="date" placeholder="DD/MM/AAAA" type="text"/>
          </div>
          <div class="email-container input-box">
            <label for="inputEmail"class="sr-only">Correo Electrónico
            <input type="text" class="form-control" id="email" placeholder="Ingrese su Correo Electrónico"></label>
            <input type="email" id="input-email" class="form-control" placeholder="Ingrese su correo electrónico" autofocus="" required>
          </div>
          <div class="form-group">
            <label for="inputAddress">Dirección</label>
            <input type="text" class="form-control" id="inputAddress" placeholder="(Calle/Av/Pasaje)">
          </div>
          <div class="form-group">
            <label for="inputAddress2">Dirección2</label>
            <input type="text" class="form-control" id="inputAddress2" placeholder="(Numero de Casa o Departamento)">
          </div>
          <div class="form-group">
            <label for="inputAddress2">Comuna de residencia</label>
            <input type="text" class="form-control" id="inputAddress3" placeholder="Ingrese su Comuna">
          </div>
          <button class="btn btn-lg btn-primary btn-block submit-btn" type="submit">Registrar</button>
        </form>
      </div>
    </section>
  </body>
</html>
